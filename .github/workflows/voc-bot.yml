name: VOC Bot - Auto Response

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    runs-on: ubuntu-latest
    # bot 자신의 코멘트는 무시 (무한 루프 방지)
    if: >
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login != 'codemate')
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup gh for GitHub Enterprise
        run: echo "${{ secrets.BOT_PAT }}" | gh auth login --hostname github.samsungds.net --with-token
        env:
          GH_PROMPT_DISABLED: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VOC Bot (new issue)
        if: github.event_name == 'issues'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DOCS_BASE_URL: ${{ secrets.DOCS_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -m src.main \
            -t "$ISSUE_TITLE" \
            -b "$ISSUE_BODY" \
            > response.txt 2>&1 || true

      - name: Run VOC Bot (follow-up comment)
        if: github.event_name == 'issue_comment'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DOCS_BASE_URL: ${{ secrets.DOCS_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 -m src.main \
            -t "$ISSUE_TITLE" \
            -b "$ISSUE_BODY" \
            -c "$COMMENT_BODY" \
            > response.txt 2>&1 || true

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            -R ${{ github.repository }} \
            -F response.txt

      - name: Assign random user (new issue only)
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          ASSIGNEE=$(python3 -c "
          import configparser, random
          c = configparser.ConfigParser()
          c.read('config.ini')
          users = [u.strip() for u in c['ASSIGNEES']['users'].split(',')]
          print(random.choice(users))
          ")
          echo "Assigning to: $ASSIGNEE"
          gh issue edit ${{ github.event.issue.number }} \
            -R ${{ github.repository }} \
            --add-assignee "$ASSIGNEE" || true

      - name: Add label if escalation needed
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          if grep -q "Confidence: insufficient" response.txt; then
            gh issue edit ${{ github.event.issue.number }} \
              -R ${{ github.repository }} \
              --add-label "needs-human-review" || true
          fi
