name: VOC Bot - Auto Response

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    runs-on: ubuntu-latest
    # bot 자신의 코멘트는 무시 (무한 루프 방지)
    if: >
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login != 'codemate')
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check if commenter is admin
        if: github.event_name == 'issue_comment'
        id: admin_check
        env:
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          ADMINS=$(python3 -c "
          import configparser
          c = configparser.ConfigParser()
          c.read('config.ini')
          print(c['ASSIGNEES']['users'])
          ")
          if echo "$ADMINS" | grep -qw "$COMMENT_USER"; then
            echo "is_admin=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: $COMMENT_USER is an admin"
          else
            echo "is_admin=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: github.event_name == 'issues' || steps.admin_check.outputs.is_admin != 'true'
        run: pip install -r requirements.txt

      - name: Run VOC Bot (new issue)
        if: github.event_name == 'issues'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DOCS_BASE_URL: ${{ secrets.DOCS_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -m src.main \
            -t "$ISSUE_TITLE" \
            -b "$ISSUE_BODY" \
            > response.txt || true

      - name: Run VOC Bot (follow-up comment)
        if: github.event_name == 'issue_comment' && steps.admin_check.outputs.is_admin != 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DOCS_BASE_URL: ${{ secrets.DOCS_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 -m src.main \
            -t "$ISSUE_TITLE" \
            -b "$ISSUE_BODY" \
            -c "$COMMENT_BODY" \
            > response.txt || true

      - name: Comment on issue
        if: github.event_name == 'issues' || steps.admin_check.outputs.is_admin != 'true'
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          if [ ! -s response.txt ]; then
            echo "⚠️ VOC Bot 응답을 생성하지 못했습니다. 담당자의 확인이 필요합니다." > response.txt
          fi
          BODY=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" < response.txt)
          curl -s -X POST \
            -H "Authorization: token $BOT_PAT" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -d "{\"body\": ${BODY}}"

      - name: Assign random user (new issue only)
        if: github.event_name == 'issues'
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          ASSIGNEE=$(python3 -c "
          import configparser, random
          c = configparser.ConfigParser()
          c.read('config.ini')
          users = [u.strip() for u in c['ASSIGNEES']['users'].split(',')]
          print(random.choice(users))
          ")
          echo "Assigning to: $ASSIGNEE"
          RESULT=$(curl -s -X POST \
            -H "Authorization: token $BOT_PAT" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/assignees" \
            -d "{\"assignees\": [\"${ASSIGNEE}\"]}")
          echo "Assign result: $RESULT"

      - name: Add label if escalation needed
        if: github.event_name == 'issues' || steps.admin_check.outputs.is_admin != 'true'
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          if grep -q "Confidence: insufficient" response.txt; then
            curl -s -X POST \
              -H "Authorization: token $BOT_PAT" \
              -H "Accept: application/vnd.github+json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
              -d '{"labels": ["needs-human-review"]}' || true
          fi
